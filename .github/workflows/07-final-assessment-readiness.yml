name: Final Assessment CI/CD

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app

jobs:

  #CI
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Tests
        run: python -m unittest discover -s tests -v

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .

  #CD
  cd:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Image Tag
        id: tag
        run: |
          TAG=$(date +%F)-${GITHUB_RUN_ID}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Deploy (Run Container)
        run: |
          docker stop tiny-app || true
          docker rm tiny-app || true

          docker run -d \
            --name tiny-app \
            -p 8000:8000 \
            -e APP_VERSION=${{ steps.tag.outputs.tag }} \
            -e ENVIRONMENT=production \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Validate
        run: |
          sleep 5
          curl http://localhost:8000/health
          curl http://localhost:8000/version
          curl http://localhost:8000/status