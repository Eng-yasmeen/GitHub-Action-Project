name: Final Assessment CI/CD

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (if any)
        run: |
          python -m pip install --upgrade pip

      - name: Run Tests
        run: python -m unittest discover -s tests -v

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .

  cd:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Generate image tag
      - name: Generate Image Tag
        id: tag
        run: |
          TAG=$(date +%F)-${GITHUB_RUN_ID}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build image (FIXED with dot)
      - name: Build Docker Image
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          USER=${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE="$USER/${{ env.IMAGE_NAME }}:$TAG"
          echo "Building image: $IMAGE"
          docker build -t "$IMAGE" .

      # Push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      # Run container locally (GitHub runner)
      - name: Deploy Container
        run: |
          docker stop tiny-app || true
          docker rm tiny-app || true

          docker run -d \
            --name tiny-app \
            -p 8000:8000 \
            -e APP_VERSION=${{ steps.tag.outputs.tag }} \
            -e ENVIRONMENT=production \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      # Validate endpoints
      - name: Validate Deployment
        run: |
          sleep 5
          curl http://localhost:8000/health
          curl http://localhost:8000/version
          curl http://localhost:8000/status