name: Final Assessment CI/CD

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app

jobs:
  # مرحلة الـ CI
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4[cite: 1]

      - name: Setup Python
        uses: actions/setup-python@v5[cite: 1]
        with:
          python-version: "3.12"[cite: 1]

      - name: Run Tests
        run: python -m unittest discover -s tests -v[cite: 1]

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0[cite: 1]
        with:
          scan-type: 'fs'[cite: 1]
          scan-ref: '.'[cite: 1]
          exit-code: '1'[cite: 1]
          severity: 'CRITICAL,HIGH'[cite: 1]

  # مرحلة الـ CD
  cd:
    needs: ci
    if: github.event_name == 'push'[cite: 1]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4[cite: 1]

      - name: Generate Tag
        id: tag
        run: echo "tag=$(date +%F)-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT[cite: 1]

      - name: Login to Docker Hub
        uses: docker/login-action@v3[cite: 1]
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}[cite: 1]
          password: ${{ secrets.DOCKERHUB_TOKEN }}[cite: 1]

      - name: Build and Push Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Deploy Container
        run: |
          docker stop tiny-app || true
          docker rm tiny-app || true
          docker run -d --name tiny-app -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}[cite: 1]

      - name: Validate
        run: |
          sleep 10[cite: 1]
          curl http://localhost:8000/health[cite: 1]