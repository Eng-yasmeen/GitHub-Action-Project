name: Final Assessment CI/CD

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Unit Tests
        run: python -m unittest discover -s tests -v

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  cd:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Dynamic Image Tag
        id: tag
        run: |
          TAG=$(date +%F)-${GITHUB_RUN_ID}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Push Image to Registry
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Deploy Container (Local Runner)
        run: |
          docker stop tiny-app || true
          docker rm tiny-app || true

          docker run -d \
            --name tiny-app \
            -p 8000:8000 \
            -e APP_VERSION=${{ steps.tag.outputs.tag }} \
            -e ENVIRONMENT=production \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Validate Deployment
        run: |
          sleep 10
          curl http://localhost:8000/health
          curl http://localhost:8000/version
          curl http://localhost:8000/status