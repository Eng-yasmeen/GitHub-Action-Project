name: Final Assessment CI/CD

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app

jobs:

  # =====================
  # CI
  # =====================
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Tests
        run: python -m unittest discover -s tests -v

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # =====================
  # CD
  # =====================
  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------
      # SAFE TAG GENERATION
      # ---------------------
      - name: Generate Tag
        id: tag
        run: |
          set -e
          TAG="$(date +%F)-${GITHUB_RUN_ID}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated TAG: $TAG"

      # ---------------------
      # LOGIN (Docker Hub)
      # ---------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------
      # BUILD (SAFE STRING)
      # ---------------------
      - name: Build Image
        run: |
          set -e

          TAG="${{ steps.tag.outputs.tag }}"
          USER="${{ secrets.DOCKERHUB_USERNAME }}"

          IMAGE="${USER}/${{ env.IMAGE_NAME }}:${TAG}"

          echo "Building IMAGE: $IMAGE"

          docker build --pull -t "$IMAGE" .

      # ---------------------
      # PUSH (SAFE STRING)
      # ---------------------
      - name: Push Image
        run: |
          set -e

          TAG="${{ steps.tag.outputs.tag }}"
          USER="${{ secrets.DOCKERHUB_USERNAME }}"

          IMAGE="${USER}/${{ env.IMAGE_NAME }}:${TAG}"

          echo "Pushing IMAGE: $IMAGE"

          docker push "$IMAGE"

      # ---------------------
      # DEPLOY (SAFE RUN)
      # ---------------------
      - name: Deploy Container
        run: |
          set -e

          TAG="${{ steps.tag.outputs.tag }}"
          USER="${{ secrets.DOCKERHUB_USERNAME }}"

          IMAGE="${USER}/${{ env.IMAGE_NAME }}:${TAG}"

          echo "Running IMAGE: $IMAGE"

          docker stop tiny-app || true
          docker rm tiny-app || true

          docker run -d \
            --name tiny-app \
            -p 8000:8000 \
            -e APP_VERSION="$TAG" \
            -e ENVIRONMENT=production \
            "$IMAGE"

      # ---------------------
      # VALIDATION (STRICT)
      # ---------------------
      - name: Validate Deployment
        run: |
          set -e
          sleep 10

          curl --fail http://localhost:8000/health
          curl --fail http://localhost:8000/version
          curl --fail http://localhost:8000/status